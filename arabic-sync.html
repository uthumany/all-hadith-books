<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رياض الصالحين - مزامنة الصوت العربي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        .arabic-text { font-family: 'Amiri', serif; font-size: 1.75rem; line-height: 3rem; }
        .highlight-sentence { background-color: #fef08a; transition: background-color 0.3s; border-radius: 4px; }
        .highlight-word { background-color: #fde047; font-weight: bold; border-radius: 2px; padding: 0 4px; transition: all 0.1s ease; }
        .hadith-container { max-height: 70vh; overflow-y: auto; }
        .active-hadith { border-right: 4px solid #059669; background-color: #f0fdf4; }
        .word { display: inline-block; cursor: pointer; margin: 0 4px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-emerald-900 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">مزامنة الحديث العربي</h1>
            <div class="space-x-4 flex flex-row-reverse gap-4">
                <a href="index.html" class="hover:underline">الرئيسية</a>
                <a href="riyad-us-saliheen-sync.html" class="hover:underline">مزامنة مزدوجة</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto py-6 px-4 flex flex-col md:flex-row-reverse gap-6">
        <div class="w-full md:w-1/3 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-lg font-bold text-gray-800">الفصول</h2>
                <input type="text" id="search" placeholder="بحث..." class="w-full mt-2 p-2 border rounded-md text-sm">
            </div>
            <div id="hadith-list" class="flex-grow overflow-y-auto hadith-container"></div>
        </div>

        <div class="w-full md:w-2/3 flex flex-col gap-4">
            <div id="player-card" class="bg-white p-6 rounded-xl shadow-md border border-emerald-100 hidden">
                <h3 id="current-title" class="text-xl font-bold text-gray-900 mb-2">اختر حديثاً</h3>
                <audio id="main-audio" controls class="w-full"></audio>
            </div>
            <div id="text-display" class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 flex-grow hidden">
                <div id="arabic-content" class="arabic-text text-gray-800 leading-relaxed"></div>
            </div>
            <div id="placeholder" class="bg-white p-12 rounded-xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-gray-400">
                <p class="text-lg">اختر فصلاً لبدء مزامنة الصوت مع النص العربي</p>
            </div>
        </div>
    </main>

    <script>
        let allHadiths = [];
        let fullHadithText = [];
        const audioPlayer = document.getElementById('main-audio');
        const arabicContent = document.getElementById('arabic-content');

        async function init() {
            const audioRes = await fetch('api/riyad_us_saliheen_audios.json');
            allHadiths = (await audioRes.json()).hadiths;
            const textRes = await fetch('api/riyad-al-salihin.json');
            fullHadithText = await textRes.json();
            renderList(allHadiths);
        }

        function renderList(list) {
            const container = document.getElementById('hadith-list');
            container.innerHTML = '';
            list.forEach(h => {
                const item = document.createElement('div');
                item.className = 'p-4 border-b border-gray-50 cursor-pointer hover:bg-emerald-50 transition text-right';
                item.innerHTML = `<div class="font-bold text-sm">#${h.hadith_number} ${h.hadith_narration_name.arabic}</div>`;
                item.onclick = () => selectHadith(h);
                container.appendChild(item);
            });
        }

        function selectHadith(hadith) {
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('player-card').classList.remove('hidden');
            document.getElementById('text-display').classList.remove('hidden');
            document.getElementById('current-title').innerText = hadith.hadith_narration_name.arabic;
            audioPlayer.src = hadith.arabic_audio_cdn_url;
            audioPlayer.play();

            const related = fullHadithText.filter(h => h.chapterId === parseInt(hadith.hadith_number));
            arabicContent.innerHTML = '';
            related.forEach((h, i) => {
                const div = document.createElement('div');
                div.id = `ar-h-${i}`;
                div.className = 'hadith-segment mb-6 p-3 transition-all';
                div.innerHTML = h.arabic.split(/\s+/).map((word, wi) => `<span class="word ar-h-${i}-word" id="ar-h-${i}-w-${wi}">${word}</span>`).join(' ');
                arabicContent.appendChild(div);
            });
        }

        audioPlayer.ontimeupdate = () => {
            if (!audioPlayer.duration) return;
            const progress = audioPlayer.currentTime / audioPlayer.duration;
            const segments = document.querySelectorAll('.hadith-segment');
            const activeIndex = Math.floor(progress * segments.length);

            segments.forEach(s => s.classList.remove('highlight-sentence'));
            const active = document.getElementById(`ar-h-${activeIndex}`);
            if (active) {
                active.classList.add('highlight-sentence');
                const words = document.querySelectorAll(`.ar-h-${activeIndex}-word`);
                const segmentProgress = (audioPlayer.currentTime % (audioPlayer.duration / segments.length)) / (audioPlayer.duration / segments.length);
                const activeWordIndex = Math.floor(segmentProgress * words.length);
                words.forEach((w, i) => i === activeWordIndex ? w.classList.add('highlight-word') : w.classList.remove('highlight-word'));
            }
        };

        document.getElementById('search').oninput = (e) => {
            const term = e.target.value;
            renderList(allHadiths.filter(h => h.hadith_narration_name.arabic.includes(term)));
        };

        init();
    </script>
</body>
</html>
