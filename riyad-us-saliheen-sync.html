<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#047857">
    <meta name="description" content="Interactive audio sync for Riyadh as-Salihin with word-by-word highlighting">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <title>Riyad us Saliheen - Interactive Audio Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        
        :root {
            --highlight-bg: #fef08a;
            --word-highlight: #fde047;
            --active-border: #059669;
            --active-bg: #f0fdf4;
        }
        
        .arabic-text { font-family: 'Amiri', serif; font-size: 1.5rem; line-height: 2.5rem; }
        .highlight-sentence { background-color: var(--highlight-bg); transition: background-color 0.3s ease; border-radius: 4px; padding: 4px 8px; }
        .highlight-word { background-color: var(--word-highlight); font-weight: bold; border-radius: 2px; padding: 0 2px; }
        .hadith-container { max-height: 70vh; overflow-y: auto; scroll-behavior: smooth; }
        .active-hadith { border-left: 4px solid var(--active-border); background-color: var(--active-bg); }
        .word { display: inline; cursor: pointer; margin: 0 1px; }
        .word:hover { text-decoration: underline; }
        .progress-bar { height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #059669, #10b981); transition: width 0.1s linear; }
        .api-status { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 9999px; }
        .api-ready { background: #d1fae5; color: #047857; }
        .api-loading { background: #fef3c7; color: #92400e; }
        .api-error { background: #fee2e2; color: #991b1b; }
        .hadith-block { margin-bottom: 1rem; padding: 0.75rem; border-radius: 0.5rem; transition: all 0.3s ease; border-left: 3px solid transparent; }
        .hadith-block.active { background-color: #f0fdf4; border-left-color: #059669; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-emerald-700 text-white p-4 shadow-lg">
        <div class="container mx-auto flex flex-wrap justify-between items-center gap-2">
            <h1 class="text-xl md:text-2xl font-bold">Dual Sync</h1>
            <div class="flex flex-wrap items-center gap-2 md:gap-4 text-sm md:text-base">
                <span id="api-status" class="api-status api-loading">Loading...</span>
                <a href="index.html" class="hover:underline">Home</a>
                <a href="english-audio.html" class="hover:underline">English Audio</a>
                <a href="arabic-audio.html" class="hover:underline">Arabic Audio</a>
                <a href="english-sync.html" class="hover:underline">English Sync</a>
                <a href="arabic-sync.html" class="hover:underline">Arabic Sync</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto py-6 px-4 flex flex-col md:flex-row gap-6">
        <!-- Sidebar: Chapter List -->
        <div class="w-full md:w-1/3 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-lg font-bold text-gray-800">Chapters</h2>
                <input type="text" id="search" placeholder="Search chapter..." class="w-full mt-2 p-2 border rounded-md text-sm">
            </div>
            <div id="hadith-list" class="flex-grow overflow-y-auto hadith-container">
                <!-- Loading state -->
                <div id="loading-state" class="p-4 text-center text-gray-500">
                    <div class="animate-spin w-8 h-8 border-4 border-emerald-500 border-t-transparent rounded-full mx-auto mb-2"></div>
                    <p>Loading chapters...</p>
                </div>
            </div>
        </div>

        <!-- Main Content: Player & Text -->
        <div class="w-full md:w-2/3 flex flex-col gap-4">
            <!-- Player Section -->
            <div id="player-card" class="bg-white p-6 rounded-xl shadow-md border border-emerald-100 hidden">
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 id="current-title" class="text-xl font-bold text-gray-900">Select a Hadith</h3>
                            <p id="current-subtitle" class="text-gray-500 text-sm"></p>
                        </div>
                        <div class="flex gap-2">
                            <button id="toggle-lang" class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold hover:bg-emerald-200 transition">Switch to Arabic Audio</button>
                            <button id="toggle-auto-scroll" class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-bold hover:bg-blue-200 transition">Auto-Scroll: ON</button>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <audio id="main-audio" controls class="w-full"></audio>
                        <div class="progress-bar">
                            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
                        </div>
                        <div class="flex justify-between text-xs text-gray-500">
                            <span id="current-time">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-center gap-4 mt-2">
                        <button id="btn-restart" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition" title="Restart">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                        <button id="btn-back10" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition" title="Back 10s">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4zM4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"></path></svg>
                        </button>
                        <button id="btn-forward10" class="p-2 bg-gray-100 rounded-full hover:bg-gray-200 transition" title="Forward 10s">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.933 12.8a1 1 0 000-1.6L6.6 7.2A1 1 0 005 8v8a1 1 0 001.6.8l5.333-4zM19.933 12.8a1 1 0 000-1.6l-5.333-4A1 1 0 0013 8v8a1 1 0 001.6.8l5.333-4z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Text Display Section -->
            <div id="text-display" class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 flex-grow hidden overflow-y-auto hadith-container">
                <!-- English Section (displayed first) -->
                <div class="mb-8">
                    <h4 class="text-sm font-bold text-emerald-600 mb-4 sticky top-0 bg-white py-2 border-b">ENGLISH</h4>
                    <div id="english-content" class="text-lg text-gray-700 leading-relaxed"></div>
                </div>
                <hr class="my-6">
                <!-- Arabic Section (displayed second) -->
                <div class="text-right">
                    <h4 class="text-sm font-bold text-emerald-600 mb-4 sticky top-0 bg-white py-2 border-b">ARABIC</h4>
                    <div id="arabic-content" class="arabic-text text-gray-800 leading-relaxed" dir="rtl"></div>
                </div>
            </div>

            <!-- Placeholder -->
            <div id="placeholder" class="bg-white p-12 rounded-xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-gray-400">
                <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                <p class="text-lg">Select a chapter from the list to begin the interactive experience</p>
            </div>
        </div>
    </main>

    <script>
        // =====================================================
        // GLOBAL STATE
        // =====================================================
        let allHadiths = [];
        let currentHadithData = null;
        let currentAudioMode = 'english';
        let fullHadithText = [];
        let hadithTimings = [];
        let autoScrollEnabled = true;
        let dataLoaded = false;
        let searchTerm = '';

        // DOM Elements
        const audioPlayer = document.getElementById('main-audio');
        const arabicContent = document.getElementById('arabic-content');
        const englishContent = document.getElementById('english-content');
        const playerCard = document.getElementById('player-card');
        const textDisplay = document.getElementById('text-display');
        const placeholder = document.getElementById('placeholder');
        const toggleLangBtn = document.getElementById('toggle-lang');
        const toggleAutoScrollBtn = document.getElementById('toggle-auto-scroll');
        const apiStatus = document.getElementById('api-status');
        const progressFill = document.getElementById('progress-fill');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const searchInput = document.getElementById('search');
        const loadingState = document.getElementById('loading-state');

        // BUG-002 Fix: Store search term and re-apply after data loads
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            if (dataLoaded) {
                applyFilter();
            }
        });

        // =====================================================
        // AUDIO CONTROL API
        // =====================================================
        window.RiyadhAudioAPI = {
            playAudio: function(chapter, time = 0) {
                const hadith = allHadiths.find(h => parseInt(h.hadith_number) === chapter);
                if (hadith) {
                    selectHadith(hadith);
                    if (time > 0) audioPlayer.currentTime = time;
                    audioPlayer.play();
                    return { success: true };
                }
                return { success: false, error: 'Chapter not found' };
            },
            pauseAudio: function() { audioPlayer.pause(); return { success: true }; },
            resumeAudio: function() { audioPlayer.play(); return { success: true }; },
            seekTo: function(time) { audioPlayer.currentTime = time; return { success: true }; },
            getState: function() {
                return {
                    currentTime: audioPlayer.currentTime,
                    duration: audioPlayer.duration,
                    isPlaying: !audioPlayer.paused,
                    currentChapter: currentHadithData ? parseInt(currentHadithData.hadith_number) : null,
                    audioMode: currentAudioMode,
                    progress: audioPlayer.duration ? (audioPlayer.currentTime / audioPlayer.duration) * 100 : 0
                };
            },
            getChapters: function() {
                return allHadiths.map(h => ({
                    number: parseInt(h.hadith_number),
                    title: h.hadith_narration_name.english.replace(/_/g, ' '),
                    titleArabic: h.hadith_narration_name.arabic
                }));
            },
            setAudioMode: function(mode) {
                if (mode === 'english' || mode === 'arabic') {
                    currentAudioMode = mode;
                    updatePlayerSource();
                    return { success: true, mode };
                }
                return { success: false, error: 'Invalid mode' };
            }
        };

        // =====================================================
        // HELPERS
        // =====================================================
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function countWords(text) {
            return text.trim().split(/\s+/).length;
        }

        function calculateTimings(hadiths, duration) {
            let totalWords = 0;
            const wordCounts = hadiths.map(h => {
                const enWords = countWords(h.english.text);
                const arWords = countWords(h.arabic);
                const words = Math.max(enWords, arWords);
                totalWords += words;
                return words;
            });
            
            const timePerWord = duration / totalWords;
            
            let currentTime = 0;
            hadithTimings = wordCounts.map((words, i) => {
                const startTime = currentTime;
                const endTime = currentTime + (words * timePerWord);
                currentTime = endTime;
                return { index: i, startTime, endTime, duration: endTime - startTime, wordCount: words };
            });
        }

        function getActiveHadithIndex(currentTime) {
            for (let i = 0; i < hadithTimings.length; i++) {
                if (currentTime >= hadithTimings[i].startTime && currentTime < hadithTimings[i].endTime) {
                    return i;
                }
            }
            if (currentTime >= hadithTimings[hadithTimings.length - 1]?.endTime) {
                return hadithTimings.length - 1;
            }
            return 0;
        }

        // =====================================================
        // INITIALIZATION (BUG-001 Fix)
        // =====================================================
        async function init() {
            updateApiStatus('loading', 'Loading...');
            loadingState.style.display = 'block';
            
            try {
                const [audioRes, textRes] = await Promise.all([
                    fetch('api/riyad_us_saliheen_audios.json'),
                    fetch('api/riyad-al-salihin.json')
                ]);
                
                const audioData = await audioRes.json();
                allHadiths = audioData.hadiths;
                fullHadithText = await textRes.json();

                dataLoaded = true;
                loadingState.style.display = 'none';
                renderList(allHadiths);
                
                if (searchTerm) {
                    applyFilter();
                }

                updateApiStatus('ready', `${allHadiths.length} chapters`);
                
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js').catch(() => {});
                }
            } catch (err) {
                console.error("Failed to initialize:", err);
                updateApiStatus('error', 'Error loading');
                loadingState.innerHTML = '<p class="text-red-500">Failed to load data. Please refresh.</p>';
            }
        }

        function updateApiStatus(status, text) {
            apiStatus.textContent = text;
            apiStatus.className = `api-status api-${status}`;
        }

        // =====================================================
        // LIST RENDERING
        // =====================================================
        function renderList(list) {
            const container = document.getElementById('hadith-list');
            container.innerHTML = '';
            
            if (list.length === 0) {
                container.innerHTML = '<p class="p-4 text-gray-500 text-center">No chapters found</p>';
                return;
            }
            
            list.forEach((h) => {
                const item = document.createElement('div');
                item.className = 'p-4 border-b border-gray-50 cursor-pointer hover:bg-emerald-50 transition flex flex-col gap-1';
                item.innerHTML = `
                    <div class="flex justify-between">
                        <span class="text-xs font-bold text-emerald-600">#${h.hadith_number}</span>
                    </div>
                    <div class="font-bold text-gray-800 text-sm truncate">${h.hadith_narration_name.english.replace(/_/g, ' ')}</div>
                    <div class="text-xs text-gray-500 text-right truncate" dir="rtl">${h.hadith_narration_name.arabic}</div>
                `;
                item.onclick = () => selectHadith(h);
                container.appendChild(item);
            });
        }

        function applyFilter() {
            const filtered = allHadiths.filter(h => 
                h.hadith_narration_name.english.toLowerCase().includes(searchTerm) ||
                h.hadith_narration_name.arabic.includes(searchTerm)
            );
            renderList(filtered);
        }

        // =====================================================
        // HADITH SELECTION
        // =====================================================
        function selectHadith(hadith) {
            currentHadithData = hadith;
            hadithTimings = [];
            
            placeholder.classList.add('hidden');
            playerCard.classList.remove('hidden');
            textDisplay.classList.remove('hidden');

            updatePlayerSource();
            document.getElementById('current-title').innerText = hadith.hadith_narration_name.english.replace(/_/g, ' ');
            document.getElementById('current-subtitle').innerText = hadith.hadith_narration_name.arabic;

            const chapterNum = parseInt(hadith.hadith_number);
            const relatedHadiths = fullHadithText.filter(h => h.chapterId === chapterNum);
            displayChapterText(relatedHadiths);
            
            document.querySelectorAll('#hadith-list > div').forEach(el => el.classList.remove('active-hadith'));
            const index = allHadiths.indexOf(hadith);
            if (index !== -1) {
                document.getElementById('hadith-list').children[index]?.classList.add('active-hadith');
            }
        }

        function updatePlayerSource() {
            const url = currentAudioMode === 'english' 
                ? currentHadithData.english_audio_cdn_url 
                : currentHadithData.arabic_audio_cdn_url;
            audioPlayer.src = url;
            toggleLangBtn.innerText = currentAudioMode === 'english' 
                ? 'Switch to Arabic Audio' 
                : 'Switch to English Audio';
            audioPlayer.play().catch(e => console.log('Autoplay prevented'));
        }

        function displayChapterText(hadiths) {
            englishContent.innerHTML = '';
            arabicContent.innerHTML = '';

            if (hadiths.length === 0) {
                englishContent.innerHTML = '<p class="text-gray-400 italic">No text content available.</p>';
                arabicContent.innerHTML = '<p class="text-gray-400 italic">No text content available.</p>';
                return;
            }

            hadiths.forEach((h, i) => {
                const enDiv = document.createElement('div');
                enDiv.id = `en-block-${i}`;
                enDiv.className = 'hadith-block';
                enDiv.innerHTML = `
                    <p class="font-bold text-emerald-700 mb-2">${h.english.narrator}</p>
                    <p>${wrapWords(h.english.text, `en-${i}`)}</p>
                `;
                englishContent.appendChild(enDiv);

                const arDiv = document.createElement('div');
                arDiv.id = `ar-block-${i}`;
                arDiv.className = 'hadith-block text-right';
                arDiv.dir = 'rtl';
                arDiv.innerHTML = wrapWords(h.arabic, `ar-${i}`);
                arabicContent.appendChild(arDiv);
            });
        }

        function wrapWords(text, prefix) {
            return text.split(/\s+/).map((word, i) => 
                `<span class="word ${prefix}-word">${word}</span>`
            ).join(' ');
        }

        // =====================================================
        // AUDIO TIME UPDATE
        // =====================================================
        audioPlayer.ontimeupdate = () => {
            if (!audioPlayer.duration) return;
            
            progressFill.style.width = `${(audioPlayer.currentTime / audioPlayer.duration) * 100}%`;
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
            
            if (hadithTimings.length === 0) {
                const chapterNum = parseInt(currentHadithData.hadith_number);
                const relatedHadiths = fullHadithText.filter(h => h.chapterId === chapterNum);
                if (relatedHadiths.length > 0) {
                    calculateTimings(relatedHadiths, audioPlayer.duration);
                }
            }
            
            const activeIndex = getActiveHadithIndex(audioPlayer.currentTime);
            
            document.querySelectorAll('.hadith-block').forEach(b => b.classList.remove('active'));
            const enBlock = document.getElementById(`en-block-${activeIndex}`);
            const arBlock = document.getElementById(`ar-block-${activeIndex}`);
            
            if (enBlock) {
                enBlock.classList.add('active');
                if (autoScrollEnabled) {
                    enBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
            if (arBlock) {
                arBlock.classList.add('active');
            }

            if (hadithTimings[activeIndex]) {
                const timing = hadithTimings[activeIndex];
                const blockProgress = (audioPlayer.currentTime - timing.startTime) / timing.duration;
                highlightWords(`en-${activeIndex}`, blockProgress);
                highlightWords(`ar-${activeIndex}`, blockProgress);
            }
        };

        function highlightWords(prefix, progress) {
            const words = document.querySelectorAll(`.${prefix}-word`);
            if (words.length === 0) return;
            const activeWordIndex = Math.floor(progress * words.length);
            words.forEach((w, i) => w.classList.toggle('highlight-word', i === activeWordIndex));
        }

        audioPlayer.onloadedmetadata = () => {
            durationEl.textContent = formatTime(audioPlayer.duration);
            hadithTimings = [];
        };

        // =====================================================
        // EVENT LISTENERS
        // =====================================================
        toggleLangBtn.onclick = () => {
            currentAudioMode = currentAudioMode === 'english' ? 'arabic' : 'english';
            updatePlayerSource();
        };

        toggleAutoScrollBtn.onclick = () => {
            autoScrollEnabled = !autoScrollEnabled;
            toggleAutoScrollBtn.textContent = `Auto-Scroll: ${autoScrollEnabled ? 'ON' : 'OFF'}`;
        };

        document.getElementById('btn-restart').onclick = () => { audioPlayer.currentTime = 0; audioPlayer.play(); };
        document.getElementById('btn-back10').onclick = () => { audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - 10); };
        document.getElementById('btn-forward10').onclick = () => { audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + 10); };

        // =====================================================
        // POSTMESSAGE API (for iframe consumers)
        // =====================================================
        // Allow parent window to control this player via postMessage
        // Commands: {action: 'play'|'pause'|'seek'|'selectChapter'|'getState', ...params}
        // Events sent to parent: 'wordHighlighted', 'chapterChanged', 'audioEnded', 'timeUpdate'
        
        const POST_MESSAGE_ORIGIN = '*'; // Allow any origin (restrict in production)
        
        function sendToParent(type, data) {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type, ...data }, POST_MESSAGE_ORIGIN);
            }
        }

        window.addEventListener('message', (event) => {
            const { action, ...params } = event.data || {};
            
            switch (action) {
                case 'play':
                    if (params.time !== undefined) audioPlayer.currentTime = params.time;
                    audioPlayer.play();
                    sendToParent('playResponse', { success: true });
                    break;
                    
                case 'pause':
                    audioPlayer.pause();
                    sendToParent('pauseResponse', { success: true });
                    break;
                    
                case 'seek':
                    audioPlayer.currentTime = params.time;
                    sendToParent('seekResponse', { success: true, time: params.time });
                    break;
                    
                case 'selectChapter':
                    const hadith = allHadiths.find(h => parseInt(h.hadith_number) === params.chapter);
                    if (hadith) {
                        selectHadith(hadith);
                        sendToParent('chapterChanged', { 
                            chapter: params.chapter,
                            title: hadith.hadith_narration_name.english.replace(/_/g, ' '),
                            titleArabic: hadith.hadith_narration_name.arabic
                        });
                    }
                    break;
                    
                case 'getState':
                    sendToParent('stateResponse', {
                        currentTime: audioPlayer.currentTime,
                        duration: audioPlayer.duration,
                        isPlaying: !audioPlayer.paused,
                        currentChapter: currentHadithData ? parseInt(currentHadithData.hadith_number) : null,
                        audioMode: currentAudioMode
                    });
                    break;
                    
                case 'setAudioMode':
                    if (params.mode === 'english' || params.mode === 'arabic') {
                        currentAudioMode = params.mode;
                        if (currentHadithData) updatePlayerSource();
                        sendToParent('audioModeChanged', { mode: params.mode });
                    }
                    break;
                    
                case 'getChapters':
                    sendToParent('chaptersResponse', {
                        chapters: allHadiths.map(h => ({
                            number: parseInt(h.hadith_number),
                            title: h.hadith_narration_name.english.replace(/_/g, ' '),
                            titleArabic: h.hadith_narration_name.arabic
                        }))
                    });
                    break;
            }
        });

        // Send events to parent window
        audioPlayer.addEventListener('play', () => sendToParent('play', { currentTime: audioPlayer.currentTime }));
        audioPlayer.addEventListener('pause', () => sendToParent('pause', { currentTime: audioPlayer.currentTime }));
        audioPlayer.addEventListener('ended', () => sendToParent('audioEnded', { currentChapter: currentHadithData ? parseInt(currentHadithData.hadith_number) : null }));
        
        // Override highlightWords to send word highlight events
        const originalHighlightWords = highlightWords;
        window.highlightWords = function(prefix, progress) {
            originalHighlightWords(prefix, progress);
            const words = document.querySelectorAll(`.${prefix}-word`);
            const activeWordIndex = Math.floor(progress * words.length);
            if (words[activeWordIndex]) {
                sendToParent('wordHighlighted', {
                    word: words[activeWordIndex].textContent,
                    index: activeWordIndex,
                    prefix: prefix
                });
            }
        };

        // Notify parent that player is ready
        sendToParent('playerReady', { 
            chapters: allHadiths.length,
            hasDualSync: true 
        });

        init();
    </script>
</body>
</html>
