<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riyad us Saliheen - Interactive Audio Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        .arabic-text { font-family: 'Amiri', serif; font-size: 1.5rem; line-height: 2.5rem; }
        .highlight-sentence { background-color: #fef08a; transition: background-color 0.3s; }
        .highlight-word { background-color: #fde047; font-weight: bold; border-radius: 2px; padding: 0 2px; }
        .hadith-container { max-height: 70vh; overflow-y: auto; }
        .active-hadith { border-left: 4px solid #059669; background-color: #f0fdf4; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-emerald-800 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">Riyad us Saliheen Sync</h1>
            <div class="space-x-4">
                <a href="index.html" class="hover:underline">Home</a>
                <a href="english-audio.html" class="hover:underline">English</a>
                <a href="arabic-audio.html" class="hover:underline">Arabic</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto py-6 px-4 flex flex-col md:flex-row gap-6">
        <!-- Sidebar: Hadith List -->
        <div class="w-full md:w-1/3 bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col">
            <div class="p-4 border-b border-gray-100">
                <h2 class="text-lg font-bold text-gray-800">Chapters</h2>
                <input type="text" id="search" placeholder="Search chapter..." class="w-full mt-2 p-2 border rounded-md text-sm">
            </div>
            <div id="hadith-list" class="flex-grow overflow-y-auto hadith-container">
                <!-- Hadith items will be injected here -->
            </div>
        </div>

        <!-- Main Content: Player & Text -->
        <div class="w-full md:w-2/3 flex flex-col gap-4">
            <!-- Player Section -->
            <div id="player-card" class="bg-white p-6 rounded-xl shadow-md border border-emerald-100 hidden">
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 id="current-title" class="text-xl font-bold text-gray-900">Select a Hadith</h3>
                            <p id="current-subtitle" class="text-gray-500 text-sm">Choose from the list to start</p>
                        </div>
                        <div class="flex gap-2">
                            <button id="toggle-lang" class="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold hover:bg-emerald-200 transition">Switch to Arabic Audio</button>
                        </div>
                    </div>
                    <audio id="main-audio" controls class="w-full"></audio>
                </div>
            </div>

            <!-- Text Display Section -->
            <div id="text-display" class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 flex-grow hidden">
                <div class="space-y-8">
                    <div class="text-right">
                        <h4 class="text-sm font-bold text-emerald-600 mb-2">ARABIC</h4>
                        <div id="arabic-content" class="arabic-text text-gray-800 leading-relaxed" dir="rtl"></div>
                    </div>
                    <hr>
                    <div>
                        <h4 class="text-sm font-bold text-emerald-600 mb-2">ENGLISH</h4>
                        <div id="english-content" class="text-lg text-gray-700 leading-relaxed"></div>
                    </div>
                </div>
            </div>

            <!-- Placeholder -->
            <div id="placeholder" class="bg-white p-12 rounded-xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center text-gray-400">
                <svg class="w-16 h-16 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                <p class="text-lg">Select a chapter from the list to begin the interactive experience</p>
            </div>
        </div>
    </main>

    <script>
        let allHadiths = [];
        let currentHadithData = null;
        let currentAudioMode = 'english'; // 'english' or 'arabic'
        let fullHadithText = []; // To store full text from the main API

        const audioPlayer = document.getElementById('main-audio');
        const arabicContent = document.getElementById('arabic-content');
        const englishContent = document.getElementById('english-content');
        const playerCard = document.getElementById('player-card');
        const textDisplay = document.getElementById('text-display');
        const placeholder = document.getElementById('placeholder');
        const toggleLangBtn = document.getElementById('toggle-lang');

        async function init() {
            try {
                // Load Audio Data
                const audioRes = await fetch('api/riyad_us_saliheen_audios.json');
                const audioData = await audioRes.json();
                allHadiths = audioData.hadiths;

                // Load Main Hadith Text Data
                const textRes = await fetch('api/riyad-al-salihin.json');
                fullHadithText = await textRes.json();

                renderList(allHadiths);
            } catch (err) {
                console.error("Failed to initialize:", err);
            }
        }

        function renderList(list) {
            const container = document.getElementById('hadith-list');
            container.innerHTML = '';
            list.forEach((h, index) => {
                const item = document.createElement('div');
                item.className = 'p-4 border-b border-gray-50 cursor-pointer hover:bg-emerald-50 transition flex flex-col gap-1';
                item.innerHTML = `
                    <div class="flex justify-between">
                        <span class="text-xs font-bold text-emerald-600">#${h.hadith_number}</span>
                    </div>
                    <div class="font-bold text-gray-800 text-sm truncate">${h.hadith_narration_name.english.replace(/_/g, ' ')}</div>
                    <div class="text-xs text-gray-500 text-right truncate" dir="rtl">${h.hadith_narration_name.arabic}</div>
                `;
                item.onclick = () => selectHadith(h);
                container.appendChild(item);
            });
        }

        function selectHadith(hadith) {
            currentHadithData = hadith;
            placeholder.classList.add('hidden');
            playerCard.classList.remove('hidden');
            textDisplay.classList.remove('hidden');

            // Update Player
            updatePlayerSource();
            document.getElementById('current-title').innerText = hadith.hadith_narration_name.english.replace(/_/g, ' ');
            document.getElementById('current-subtitle').innerText = hadith.hadith_narration_name.arabic;

            // Find matching text from fullHadithText
            // Note: The audio JSON uses "hadith_number" which corresponds to chapters in some contexts.
            // For a true sync, we'd need word-level timestamps. Since they aren't provided, 
            // we'll implement a simulated highlighting that cycles through sentences based on duration.
            
            // Try to find hadiths belonging to this "chapter"
            const chapterNum = parseInt(hadith.hadith_number);
            const relatedHadiths = fullHadithText.filter(h => h.chapterId === chapterNum);
            
            displaySynchronizedText(relatedHadiths);
            
            // Highlight active item in list
            document.querySelectorAll('#hadith-list > div').forEach(el => el.classList.remove('active-hadith'));
            const index = allHadiths.indexOf(hadith);
            document.getElementById('hadith-list').children[index].classList.add('active-hadith');
        }

        function updatePlayerSource() {
            const url = currentAudioMode === 'english' ? currentHadithData.english_audio_cdn_url : currentHadithData.arabic_audio_cdn_url;
            audioPlayer.src = url;
            toggleLangBtn.innerText = currentAudioMode === 'english' ? 'Switch to Arabic Audio' : 'Switch to English Audio';
            audioPlayer.play();
        }

        toggleLangBtn.onclick = () => {
            currentAudioMode = currentAudioMode === 'english' ? 'arabic' : 'english';
            updatePlayerSource();
        };

        function displaySynchronizedText(hadiths) {
            arabicContent.innerHTML = '';
            englishContent.innerHTML = '';

            if (hadiths.length === 0) {
                arabicContent.innerHTML = '<p class="text-gray-400 italic">No text content available for this chapter in the main API.</p>';
                englishContent.innerHTML = '<p class="text-gray-400 italic">No text content available.</p>';
                return;
            }

            hadiths.forEach((h, i) => {
                // Wrap each hadith in a span for highlighting
                const aSpan = document.createElement('span');
                aSpan.id = `ar-h-${i}`;
                aSpan.className = 'hadith-segment p-1';
                aSpan.innerText = h.arabic + ' ';
                arabicContent.appendChild(aSpan);

                const eSpan = document.createElement('span');
                eSpan.id = `en-h-${i}`;
                eSpan.className = 'hadith-segment p-1';
                eSpan.innerHTML = `<strong>${h.english.narrator}</strong> ${h.english.text} <br><br>`;
                englishContent.appendChild(eSpan);
            });
        }

        // Simulated Synchronization Logic
        audioPlayer.ontimeupdate = () => {
            if (!audioPlayer.duration) return;
            
            const progress = audioPlayer.currentTime / audioPlayer.duration;
            const segments = document.querySelectorAll('.hadith-segment');
            if (segments.length === 0) return;

            // Determine which segment to highlight based on progress
            const segmentCount = segments.length / 2; // Arabic and English pairs
            const activeIndex = Math.floor(progress * segmentCount);

            document.querySelectorAll('.hadith-segment').forEach(s => s.classList.remove('highlight-sentence'));
            
            const arActive = document.getElementById(`ar-h-${activeIndex}`);
            const enActive = document.getElementById(`en-h-${activeIndex}`);
            
            if (arActive) {
                arActive.classList.add('highlight-sentence');
                // Scroll into view if needed
                if (activeIndex % 3 === 0) arActive.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            if (enActive) enActive.classList.add('highlight-sentence');
        };

        document.getElementById('search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allHadiths.filter(h => 
                h.hadith_narration_name.english.toLowerCase().includes(term) || 
                h.hadith_narration_name.arabic.includes(term)
            );
            renderList(filtered);
        };

        init();
    </script>
</body>
</html>
